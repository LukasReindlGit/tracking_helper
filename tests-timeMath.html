<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>timeMath sanity checks</title>
</head>
<body>
  <p>Open the console (F12). Assertions run on load. Serve this folder over HTTP so the module loads.</p>
  <script type="module">
    import * as tm from "./js/timeMath.js";

    function check(name, cond) {
      if (!cond) console.error("FAIL:", name);
      else console.log("ok:", name);
      console.assert(cond, name);
    }

    check("secondsToDecimalHours 1h", tm.secondsToDecimalHours(3600) === 1);
    check(
      "secondsToDecimalHours 5.3h",
      tm.secondsToDecimalHours(5.3 * 3600) === 5.3
    );

    const seg = [{ topicId: "a", startMs: 0, endMs: 3600000 }];
    const t = tm.totalsPerTopic(seg, null, null, 0);
    check("totalsPerTopic segment", t.a === 3600);

    const t2 = tm.totalsPerTopic([], "x", 1000000, 1000000 + 7200000);
    check("totalsPerTopic active", Math.abs(t2.x - 7200) < 1e-6);

    check(
      "remainderHoursToEight",
      tm.remainderHoursToEight({ a: 5 * 3600 }) === 3
    );

    const scaled = tm.scaledToEightHours({
      a: 3 * 3600,
      b: 2 * 3600,
    });
    const byId = Object.fromEntries(scaled.map((r) => [r.topicId, r.scaledHours]));
    check(
      "scaledToEightHours 3h+2h (default quarter round-up)",
      byId.a === 5 && byId.b === 3.25
    );

    const scaledNone = tm.scaledToTargetHours(
      { a: 3 * 3600, b: 2 * 3600 },
      8,
      "none"
    );
    const byNone = Object.fromEntries(
      scaledNone.map((r) => [r.topicId, r.scaledHours])
    );
    check(
      "scaledToTargetHours 8h none",
      byNone.a === 4.8 && byNone.b === 3.2
    );

    const scaled6 = tm.scaledToTargetHours(
      { a: 3 * 3600, b: 2 * 3600 },
      6,
      "none"
    );
    const byId6 = Object.fromEntries(
      scaled6.map((r) => [r.topicId, r.scaledHours])
    );
    check(
      "scaledToTargetHours 6h total",
      byId6.a === 3.6 && byId6.b === 2.4
    );

    const scaledQ = tm.scaledToTargetHours(
      { a: 3 * 3600, b: 2 * 3600 },
      8,
      "quarter"
    );
    const byQ = Object.fromEntries(
      scaledQ.map((r) => [r.topicId, r.scaledHours])
    );
    check(
      "scaledToTargetHours quarter ceil 3h+2h to 8h",
      byQ.a === 5 && byQ.b === 3.25
    );

    const scaledH = tm.scaledToTargetHours(
      { a: 3 * 3600, b: 2 * 3600 },
      8,
      "half"
    );
    const byH = Object.fromEntries(
      scaledH.map((r) => [r.topicId, r.scaledHours])
    );
    check("scaledToTargetHours half ceil", byH.a === 5 && byH.b === 3.5);

    const scaled1 = tm.scaledToTargetHours(
      { a: 3 * 3600, b: 2 * 3600 },
      8,
      "hour"
    );
    const by1 = Object.fromEntries(
      scaled1.map((r) => [r.topicId, r.scaledHours])
    );
    check("scaledToTargetHours hour ceil", by1.a === 5 && by1.b === 4);

    const scaled5m = tm.scaledToTargetHours(
      { a: 3 * 3600, b: 2 * 3600 },
      8,
      "quarter",
      true
    );
    const by5m = Object.fromEntries(
      scaled5m.map((r) => [r.topicId, r.scaledHours])
    );
    check(
      "scaledToTargetHours quarter + 5min rule 3h+2h to 8h",
      by5m.a === 4.75 && by5m.b === 3.25
    );

    const scaledEdge = tm.scaledToTargetHours(
      { a: 3700, b: 5900 },
      8,
      "quarter",
      true
    );
    const byE = Object.fromEntries(
      scaledEdge.map((r) => [r.topicId, r.scaledHours])
    );
    check(
      "5min rule: remainder exactly 5 min rounds down",
      byE.a === 3 && byE.b === 5
    );

    check(
      "formatSecondsAsHhMmSs zero",
      tm.formatSecondsAsHhMmSs(0) === "0:00:00"
    );
    check(
      "formatSecondsAsHhMmSs 1h",
      tm.formatSecondsAsHhMmSs(3600) === "1:00:00"
    );
    check(
      "formatSecondsAsHhMmSs 90m",
      tm.formatSecondsAsHhMmSs(90 * 60) === "1:30:00"
    );
    check(
      "formatSecondsAsHhMmSs floors subsecond",
      tm.formatSecondsAsHhMmSs(5.9) === "0:00:05"
    );

    check(
      "parseTimeInputToSeconds decimal",
      Math.abs(tm.parseTimeInputToSeconds("5.3") - 5.3 * 3600) < 1e-6
    );
    check(
      "parseTimeInputToSeconds h:mm:ss",
      tm.parseTimeInputToSeconds("1:05:30") === 3600 + 5 * 60 + 30
    );
    check(
      "parseTimeInputToSeconds mm:ss",
      tm.parseTimeInputToSeconds("5:30") === 5 * 60 + 30
    );

    console.log("timeMath checks finished.");
  </script>
</body>
</html>
